services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - OMDB_API_KEY=${OMDB_API_KEY:-}
      - PORT=3001
    volumes:
      - ${SOURCE_DIR}:/media/source
      - ${MOVIES_DIR}:/media/movies
      - ${SERIES_DIR}:/media/series
    expose:
      - "3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
